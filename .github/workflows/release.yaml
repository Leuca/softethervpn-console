name: Release

on:
  push:
    tags:
      - "v*.*.*"

permissions:
  contents: write

jobs:
  release:
    name: Build and publish release
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: lts/*
          cache: npm

      - name: Install dependencies
        run: |
          npm ci
          npm ci --prefix gateway

      - name: Check release version
        run: |
          package_version="$(node -p "require('./package.json').version")"
          tag_version="${GITHUB_REF_NAME#v}"
          if [ "$package_version" != "$tag_version" ]; then
            echo "Tag $GITHUB_REF_NAME does not match package version $package_version" >&2
            exit 1
          fi

      - name: Run checks
        run: npm run ci-checks

      - name: Build and package integrated release bundle
        run: |
          npm run build:integrated
          artifact="softethervpn-console-${GITHUB_REF_NAME}.tar.gz"
          tar -czf "$artifact" -C dist .
          sha256sum "$artifact" > "$artifact.sha256"

      - name: Build and package managed release bundle
        run: |
          npm run build:managed
          npm --prefix gateway run build
          artifact="softethervpn-console-managed-${GITHUB_REF_NAME}.tar.gz"
          tar -czf "$artifact" \
            dist \
            gateway/dist \
            gateway/package.json \
            gateway/package-lock.json \
            gateway/README.md
          sha256sum "$artifact" > "$artifact.sha256"

      - name: Publish GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          artifact="softethervpn-console-${GITHUB_REF_NAME}.tar.gz"
          managed_artifact="softethervpn-console-managed-${GITHUB_REF_NAME}.tar.gz"
          prerelease_args=()
          if [[ "${GITHUB_REF_NAME#v}" == *-* ]]; then
            prerelease_args+=(--prerelease)
          fi

          gh release create "$GITHUB_REF_NAME" \
            --title "SoftEther VPN Console $GITHUB_REF_NAME" \
            --generate-notes \
            "${prerelease_args[@]}" \
            "$artifact" \
            "$artifact.sha256" \
            "$managed_artifact" \
            "$managed_artifact.sha256"

  srpm:
    name: Build and publish source RPM
    needs: release
    runs-on: ubuntu-latest
    container: fedora:latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Fedora packaging tools
        run: >-
          dnf install -y
          gh
          git-core
          nodejs-packaging-bundler
          rpm-build
          rpmlint
          systemd-rpm-macros

      - name: Build source RPM
        env:
          GITHUB_REPOSITORY: ${{ github.repository }}
        run: |
          packaging/build-srpm.sh "${GITHUB_REF_NAME#v}" "$RUNNER_TEMP/srpm"

      - name: Publish source RPM
        env:
          GH_TOKEN: ${{ github.token }}
        run: >-
          gh release upload "$GITHUB_REF_NAME"
          --repo "$GITHUB_REPOSITORY"
          --clobber
          "$RUNNER_TEMP"/srpm/*
